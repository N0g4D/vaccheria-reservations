[server]
enableCORS = false
enableXsrfProtection = false

[theme]
# Force light theme for all users
base="light"

# Primary color (for buttons and focus states) - an elegant dark red/brick color
primaryColor="#c0392b"

# Page background color (a very light cream white)
backgroundColor="#fdfbf7"

# Secondary background color for boxes (e.g., the calendar)
secondaryBackgroundColor="#f1f2f6"

# Text color (anthracite gray, more elegant than pure black)
textColor="#2c3e50"

# Base font
font="sans serif"